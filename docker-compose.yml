services:
  intelligenthr-app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8510:8510"
    environment:
      - STREAMLIT_SERVER_PORT=8510
      - TZ=Asia/Shanghai
    env_file:
      - .env
    volumes:
      - .:/app
    command: streamlit run frontend/app.py --server.port=8510 --server.address=0.0.0.0
    restart: always

  # 说明：向量库、关系型库、对象存储均已改为纯本地 SQLite/libSQL + 本地文件系统，
  # 不再需要 Milvus / MySQL / MinIO 等独立 server。以下仅保留可选的 Langfuse 监控栈
  # （通过 --profile langfuse 启用；未配置时应用会优雅降级、照常运行）。

  langfuse-server:
    image: langfuse/langfuse:2
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/postgres
      - NEXTAUTH_SECRET=mysecret
      - SALT=mysalt
      - ENCRYPTION_KEY=df04986017e5097f9ca46e46e8614d07c6cd275c2ba0324adc253bbc35771f08
      - NEXTAUTH_URL=http://localhost:3000
      - TELEMETRY_ENABLED=${TELEMETRY_ENABLED:-true}
      - LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES=${LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES:-false}
      - TZ=Asia/Shanghai
    profiles:
      - langfuse
    restart: always

  db:
    image: postgres
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
      - TZ=Asia/Shanghai
    ports:
      - 5432:5432
    volumes:
      - ../data/postgres:/var/lib/postgresql/data
    profiles:
      - langfuse

networks:
  default:
    name: intelligenthr
